version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: uzum_postgres
    restart: always
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
      POSTGRES_DB: uzum_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
